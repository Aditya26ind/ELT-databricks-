bundle:
  name: databricks-elt-pipeline

variables:
  s3_bucket:
    description: S3 bucket name
    default: your-bucket

resources:
  jobs:
    elt_pipeline_job:
      name: "ELT Pipeline - Orders"

      schedule:
        quartz_cron_expression: "0 0 14 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - python-dotenv>=1.0.0
              - boto3>=1.26.0
              - pandas>=1.5.0

      tasks:
        - task_key: run_etl
          spark_python_task:
            python_file: ./run.py
            parameters:
              - "--production=true"
          environment_key: default

targets:
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      s3_bucket: your-prod-bucket
